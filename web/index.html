<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bastion — Firewall Onboarding</title>
    <meta name="description" content="Guided, auditable firewall baselining." />
    <script>
      // Apply the saved theme before first paint to avoid a flash. Dark default.
      try {
        if (localStorage.getItem("bastion-theme") === "light") {
          document.documentElement.classList.add("theme-light");
        }
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
